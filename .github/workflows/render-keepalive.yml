name: Render Keepalive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    env:
      KEEPALIVE_URLS: ${{ vars.RENDER_KEEPALIVE_URLS || vars.RENDER_KEEPALIVE_URL || 'https://glit-b1yn.onrender.com/healthz' }}
    steps:
      - name: Ping Render health endpoint
        run: |
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            echo "Pinging $url"
            curl --fail --silent --show-error --max-time 20 \
              --retry 2 --retry-delay 5 \
              "$url"
          done <<< "$KEEPALIVE_URLS"
