services:
  - type: web
    name: glit
    env: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: B2_S3_ENDPOINT
        sync: false
      - key: B2_REGION
        sync: false
      - key: B2_BUCKET
        sync: false
      - key: B2_PREFIX
        value: submissions/
      - key: B2_KEY_ID
        sync: false
      - key: B2_APPLICATION_KEY
        sync: false
      - key: B2_PRESIGN_EXPIRES_SECONDS
        value: "900"
      - key: B2_ACCESS_URL_EXPIRES_SECONDS
        value: "86400"
      - key: INICIS_ENV
        value: prod
      - key: INICIS_MID_PROD
        sync: false
      - key: INICIS_SIGN_KEY_PROD
        sync: false
      - key: INICIS_STDJS_URL_PROD
        value: https://stdpay.inicis.com/stdjs/INIStdPay.js
      - key: NEXT_PUBLIC_SUPPORT_EMAIL
        sync: false
      - key: NEXT_PUBLIC_SUPPORT_PHONE
        sync: false
      - key: NEXT_PUBLIC_BANK_NAME
        sync: false
      - key: NEXT_PUBLIC_BANK_ACCOUNT
        sync: false
      - key: NEXT_PUBLIC_BANK_HOLDER
        sync: false
      - key: NEXT_PUBLIC_UPLOAD_MAX_MB
        value: "4096"
      - key: NEXT_PUBLIC_AUDIO_UPLOAD_MAX_MB
        value: "4096"
      - key: NEXT_PUBLIC_VIDEO_UPLOAD_MAX_MB
        value: "4096"
      - key: KAKAO_ALIMTALK_WEBHOOK_URL
        sync: false
      - key: KAKAO_ALIMTALK_API_KEY
        sync: false
      - key: KAKAO_ALIMTALK_TEMPLATE_CODE
        value: ONSIDE_OFFICIAL_NOTICE
      - key: SPELLCHECK_SERVICE_URL
        sync: false
      - key: SPELLCHECK_SHARED_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_TRANSLATION_MODEL
        value: gpt-5.5
      - key: OPENAI_TRANSLATION_TIMEOUT_MS
        value: "15000"
  - type: web
    name: glit-spellcheck
    env: python
    plan: starter
    rootDir: services/spellcheck
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: ALLOWED_ORIGINS
        value: https://glit-b1yn.onrender.com
      - key: SPELLCHECK_SHARED_SECRET
        sync: false
